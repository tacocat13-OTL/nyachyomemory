<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>냐쵸 메모리 카드게임</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Arial,"Apple SD Gothic Neo",sans-serif;background:radial-gradient(circle at top left,#fff0fa 0,transparent 34%),radial-gradient(circle at bottom right,#e8ddff 0,transparent 36%),linear-gradient(135deg,#f8f0ff,#fff7fb);color:#4b3c66;display:flex;justify-content:center;align-items:center;padding:22px}
.app{width:min(1180px,100%);display:grid;grid-template-columns:270px 1fr;gap:18px}
.panel,.game{background:rgba(255,255,255,.8);border:2px solid rgba(142,112,190,.25);border-radius:24px;box-shadow:0 14px 35px rgba(95,67,130,.18);backdrop-filter:blur(6px)}
.panel{padding:22px}
.title{font-size:30px;line-height:1.1;font-weight:900;color:#7557ad;text-shadow:0 3px 0 #fff;margin-bottom:14px}
.subtitle{background:#8064b6;color:white;border-radius:999px;padding:10px 12px;font-weight:700;margin-bottom:18px}
.box{background:rgba(255,255,255,.72);border:1px solid rgba(142,112,190,.22);border-radius:16px;padding:16px;margin:14px 0;line-height:1.7;font-weight:700}
.box h3{margin:0 0 8px;font-size:17px;color:#6d55a2}
button{width:100%;border:0;border-radius:15px;padding:14px 16px;background:linear-gradient(135deg,#8d6fd1,#6b4ca8);color:white;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 #563d8f}
button:active{transform:translateY(3px);box-shadow:0 3px 0 #563d8f}
.game{padding:22px}
.top{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:14px;margin-bottom:18px;align-items:center}
.stat,.message{background:rgba(255,255,255,.78);border:2px solid rgba(142,112,190,.2);border-radius:20px;padding:14px;text-align:center;font-weight:800}
.stat .num{font-size:30px;color:#7255aa}
.message{background:linear-gradient(135deg,#805fb4,#6f559e);color:white;font-size:24px}
.message small{display:block;font-size:14px;margin-top:5px;opacity:.9}
#board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:14px;border-radius:22px;background:rgba(104,78,147,.18)}
.card{aspect-ratio:1/1;position:relative;border-radius:18px;cursor:pointer;transform-style:preserve-3d;transition:transform .32s ease}
.card.revealed,.card.matched{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;overflow:hidden;box-shadow:0 5px 12px rgba(42,31,59,.25);border:3px solid rgba(255,255,255,.8)}
.front{transform:rotateY(180deg);background:white}
.face img{width:100%;height:100%;object-fit:cover;display:block}
.matched{cursor:default;filter:saturate(.92);pointer-events:none;animation:vanish .35s ease .25s forwards}
.matched .front::after{content:"✓";position:absolute;right:8px;bottom:5px;color:white;background:#69bd82;width:28px;height:28px;line-height:28px;border-radius:999px;font-weight:900}@keyframes vanish{to{opacity:0;visibility:hidden;transform:rotateY(180deg) scale(.75)}}
@media(max-width:850px){body{padding:10px;align-items:start}.app{grid-template-columns:1fr}.panel{order:2}.top{grid-template-columns:1fr}#board{gap:8px;padding:9px}}
</style>
</head>
<body>
<div class="app">
<aside class="panel">
<div class="title">냐쵸<br>메모리 카드게임</div>
<div class="subtitle">🐾 같은 그림을 맞춰보세요!</div>
<div class="box"><h3>게임 방법</h3>▶️ 시작하기 버튼을 누르면 10초 동안 카드가 공개됩니다.<br>🃏 같은 그림 2장을 맞추세요.<br>⭐ 별 카드는 보너스 카드입니다.</div>
<div class="box"><h3>게임 정보</h3>시도 횟수: <b id="sideAttempts">0</b>회<br>매치 성공: <b id="sideMatches">0 / 12</b></div>
<button id="startBtn">▶ 시작하기</button><button id="restartBtn" onclick="location.reload()" style="display:none;margin-top:10px;">↻ 다시 시작</button>
</aside>
<main class="game">
<div class="top">
<div class="stat">기억 시간<div class="num" id="time">10초</div></div>
<div class="message" id="status">시작 대기 중<small>시작하기 버튼을 누르면 카드가 공개됩니다</small></div>
<div class="stat">시도 횟수<div class="num" id="attempts">0</div></div>
</div>
<div id="board"></div>
</main>
</div>

const board=document.getElementById("board"),statusEl=document.getElementById("status"),timeEl=document.getElementById("time"),attemptsEl=document.getElementById("attempts"),sideAttempts=document.getElementById("sideAttempts"),sideMatches=document.getElementById("sideMatches");
let lock=true,first=null,second=null,matchedCount=0,matchedPairs=0,attempts=0,audioCtx=null,gameStarted=false;
function initAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();}
function playSound(type){initAudio();const now=audioCtx.currentTime;function tone(freq,dur,wave="sine",vol=.08,delay=0){const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.type=wave;osc.frequency.setValueAtTime(freq,now+delay);gain.gain.setValueAtTime(vol,now+delay);gain.gain.exponentialRampToValueAtTime(.001,now+delay+dur);osc.start(now+delay);osc.stop(now+delay+dur);}if(type==="flip")tone(620,.08,"triangle");if(type==="match"){tone(660,.12);tone(920,.14,"sine",.08,.08);}if(type==="fail")tone(180,.18,"sawtooth",.07);if(type==="clear")[523,659,784,1046].forEach((n,i)=>tone(n,.18,"sine",.09,i*.11));}
function updateScore(){attemptsEl.textContent=attempts;sideAttempts.textContent=attempts;sideMatches.textContent=`${matchedPairs} / 12`;}
function setStatus(text,small=""){statusEl.innerHTML=text+(small?`<small>${small}</small>`:"");}
values.forEach((item)=>{const card=document.createElement("div");card.className="card";card.dataset.id=item.id;if(item.bonus)card.dataset.bonus="true";card.innerHTML=`<div class="face back"><img src="${backImage}" alt="카드 뒷면"></div><div class="face front"><img src="${item.src}" alt="카드 이미지"></div>`;card.onclick=()=>{if(lock||card.classList.contains("matched")||card===first||card.classList.contains("revealed"))return;playSound("flip");card.classList.add("revealed");if(card.dataset.bonus==="true"){attempts++;card.classList.add("matched");matchedCount++;playSound("match");updateScore();checkClear();return;}if(!first){first=card;return;}second=card;attempts++;lock=true;updateScore();if(first.dataset.id===second.dataset.id){first.classList.add("matched");second.classList.add("matched");matchedCount+=2;matchedPairs++;first=null;second=null;lock=false;playSound("match");updateScore();checkClear();}else{playSound("fail");setTimeout(()=>{first.classList.remove("revealed");second.classList.remove("revealed");first=null;second=null;lock=false;},720);}};board.appendChild(card);});
function checkClear(){if(matchedCount===values.length){setStatus("🎉 클리어!",`총 ${attempts}회 시도했습니다`);timeEl.textContent="완료";lock=true;playSound("clear");}}
const startBtn=document.getElementById("startBtn");
const restartBtn=document.getElementById("restartBtn");

startBtn.onclick=()=>{
  if(gameStarted)return;
  gameStarted=true;
  initAudio();
  startBtn.style.display="none";
  restartBtn.style.display="block";
  lock=true;
  document.querySelectorAll(".card").forEach(card=>card.classList.add("revealed"));
  setStatus("카드를 기억하세요!","10초 후 카드가 뒤집힙니다");
  let previewTime=10;
  timeEl.textContent="10초";

  const timer=setInterval(()=>{
    previewTime--;
    timeEl.textContent=String(previewTime).padStart(2,"0")+"초";
    if(previewTime<=0){
      clearInterval(timer);
      document.querySelectorAll(".card:not(.matched)").forEach(card=>card.classList.remove("revealed"));
      lock=false;
      timeEl.textContent="START";
      setStatus("게임 시작!","같은 그림을 찾아주세요");
    }
  },1000);
};
</script>
</body>
</html>
